  (function() {

    const iframeId = 'code_698334ca74302cd521f97d66';

    const originalConsole = {

      clear: console.clear
    };

    // 覆盖所有控制台方法
    Object.keys(originalConsole).forEach(method =&gt; {
      console[method] = function() {
        const timestamp = new Date().toISOString();
        const args = Array.from(arguments).map(arg =&gt; {
          if (arg instanceof Error) {
            return {
              type: 'Error',
              message: arg.message,
              stack: arg.stack
            };
          }
          return arg;
        });

        // 如果是clear方法，发送清除消息
        if (method === 'clear') {
          window.parent.postMessage({
            type: 'console',
            method: 'clear',
            timestamp
          }, '*');
        } else {
                  // 通过postMessage发送到父窗口
        try {
          window.parent.postMessage({
            type: 'console',
            iframeId: iframeId,
            method,
            args,
            timestamp
          }, '*');
        } catch (e) {
          window.parent.postMessage({
            type: 'console',
            iframeId: iframeId,
            method: 'error',
            args: ['[无法序列化的控制台输出]'],
            timestamp
          }, '*');
        }
        }

        // 调用原始方法
        return originalConsole[method].apply(console, arguments);
      };

    &lt;script&gt;
        // 配置
        const ROWS = 12;
        const COLS = 20;
        const SVG_WIDTH = 800;
        const SVG_HEIGHT = 450;
        const GB_Y = SVG_HEIGHT / 2;
        const ATOM_RADIUS = 8;
        
        // 状态
        let currentDopant = 'none';
        let atoms = [];

        // 初始化晶格
        function initLattice() {
            const group = document.getElementById('atoms-group');
            group.innerHTML = '';
            atoms = [];

            for (let r = 0; r &lt; ROWS; r++) {
                for (let c = 0; c &lt; COLS; c++) {
                    const x = (c + 0.5) * (SVG_WIDTH / COLS);
                    const y = (r + 0.5) * (SVG_HEIGHT / ROWS);
                    
                    // 随机微扰，模拟真实晶格热振动
                    const jitterX = (Math.random() - 0.5) * 4;
                    const jitterY = (Math.random() - 0.5) * 4;

                    const circle = document.createElementNS(&quot;http://www.w3.org/2000/svg&quot;, &quot;circle&quot;);
                    circle.setAttribute(&quot;cx&quot;, x + jitterX);
                    circle.setAttribute(&quot;cy&quot;, y + jitterY);
                    circle.setAttribute(&quot;r&quot;, ATOM_RADIUS);
                    circle.setAttribute(&quot;fill&quot;, Math.random() &gt; 0.5 ? '#94A3B8' : '#475569'); // Si or C
                    circle.setAttribute(&quot;opacity&quot;, &quot;0.8&quot;);
                    circle.classList.add(&quot;atom&quot;);
                    
                    group.appendChild(circle);

                    atoms.push({
                        el: circle,
                        baseX: x + jitterX,
                        baseY: y + jitterY,
                        isDopant: false,
                        row: r,
                        col: c
                    });
                }
            }
        }

        // 设置掺杂剂类型
        function setDopant(type) {
            currentDopant = type;
            
            // 更新按钮样式
            document.querySelectorAll('button').forEach(btn =&gt; {
                if(btn.dataset.type === type) {
                    btn.classList.add('ring-1', 'ring-cyan-500', 'text-white');
                    btn.classList.remove('text-slate-300');
                } else {
                    btn.classList.remove('ring-1', 'ring-cyan-500', 'text-white');
                    btn.classList.add('text-slate-300');
                }
            });

            // 重置滑块
            document.getElementById('segregation-slider').value = 0;
            updateSimulation(0);
        }

        // 更新模拟状态
        function updateSimulation(percent) {
            const p = percent / 100;
            const gbLine = document.getElementById('gb-boundary');
            const energyVal = document.getElementById('energy-val');
            const strengthVal = document.getElementById('strength-val');
            const segVal = document.getElementById('segregation-val');
            const statusText = document.getElementById('status-text');
            const statusLight = document.getElementById('status-light');
            const sliderVal = document.getElementById('slider-val');

            sliderVal.innerText = percent + '%';

            // 1. 决定哪些原子变成掺杂剂 (基于距离晶界的远近和随机性)
            // 偏析逻辑：原子倾向于向晶界(GB)移动
            
            let dopantColor = '';
            let targetEnergy = 1.24;
            let targetStrength = 100;
            let statusMsg = '';
            let statusColor = '';

            if (currentDopant === 'none') {
                dopantColor = 'none';
                targetEnergy = 1.24;
                targetStrength = 100;
                statusMsg = '系统纯净，晶界处于标准能态。';
                statusColor = '#475569'; // slate-600
                gbLine.setAttribute('class', 'gb-line stroke-slate-700/50');
            } else if (currentDopant === 'O') {
                dopantColor = '#EF4444'; // Red
                targetEnergy = 1.24 - (0.4 * p); // 能量降低(热力学有利)
                targetStrength = 100 - (60 * p); // 强度大幅下降
                statusMsg = '氧原子偏析导致晶界氧化，形成非晶态二氧化硅，结构脆化。';
                statusColor = '#EF4444';
                gbLine.setAttribute('class', p &gt; 0.5 ? 'gb-line gb-fragile' : 'gb-line stroke-slate-700/50');
            } else if (currentDopant === 'He') {
                dopantColor = '#F59E0B'; // Amber
                targetEnergy = 1.24 - (0.2 * p);
                targetStrength = 100 - (80 * p); // 强度剧烈下降
                statusMsg = '氦气泡在晶界聚集，产生体积膨胀，导致灾难性起泡与断裂。';
                statusColor = '#F59E0B';
                gbLine.setAttribute('class', p &gt; 0.5 ? 'gb-line gb-fragile' : 'gb-line stroke-slate-700/50');
            } else if (currentDopant === 'B') {
                dopantColor = '#10B981'; // Emerald
                targetEnergy = 1.24 - (0.3 * p);
                targetStrength = 100 + (40 * p); // 强度提升
                statusMsg = '硼原子填充晶界空隙，增强原子间键合，起到钉扎强化作用。';
                statusColor = '#10B981';
                gbLine.setAttribute('class', p &gt; 0.5 ? 'gb-line gb-stable' : 'gb-line stroke-slate-700/50');
            }

            statusLight.style.backgroundColor = statusColor;
            statusLight.style.boxShadow = `0 0 15px ${statusColor}`;

            // 更新数值
            energyVal.innerText = targetEnergy.toFixed(2) + ' J/m²';
            strengthVal.innerText = Math.round(targetStrength) + '%';
            segVal.innerText = (p * 2.5).toFixed(2) + ' at%';
            statusText.innerText = statusMsg;

            // 2. 动画更新原子位置和颜色
            atoms.forEach(atom =&gt; {
                const distToGB = Math.abs(atom.baseY - GB_Y);
                const isNearGB = distToGB &lt; 60; // 晶界附近区域
                
                // 偏析概率：越靠近晶界，越容易变成掺杂剂
                let segregationProb = 0;
                if (isNearGB) {
                    segregationProb = 1 - (distToGB / 60);
                }

                // 决定是否变色
                if (currentDopant !== 'none' &amp;&amp; Math.random() &lt; segregationProb * p) {
                    atom.el.setAttribute(&quot;fill&quot;, dopantColor);
                    atom.el.setAttribute(&quot;r&quot;, ATOM_RADIUS + 2); // 杂质原子通常半径不同
                } else {
                    atom.el.setAttribute(&quot;fill&quot;, Math.random() &gt; 0.5 ? '#94A3B8' : '#475569');
                    atom.el.setAttribute(&quot;r&quot;, ATOM_RADIUS);
                }

                // 决定位移 (模拟向晶界聚集)
                let targetX = atom.baseX;
                let targetY = atom.baseY;

                if (currentDopant !== 'none' &amp;&amp; p &gt; 0) {
                    // 如果是杂质，向晶界(Y=225)靠拢
                    if (atom.el.getAttribute(&quot;fill&quot;) === dopantColor) {
                        const dir = atom.baseY &lt; GB_Y ? 1 : -1;
                        // 移动幅度取决于偏析程度
                        targetY = atom.baseY + (dir * (GB_Y - atom.baseY) * p * 0.8);
                        
                        // 如果是 He (气泡)，产生横向排斥
                        if (currentDopant === 'He') {
                            targetX += (Math.random() - 0.5) * 20 * p;
                        }
                    }
                }

                atom.el.setAttribute(&quot;cx&quot;, targetX);
                atom.el.setAttribute(&quot;cy&quot;, targetY);
            });
        }

        // 启动
        initLattice();
    &lt;/script&gt;
