<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位错可视化 - 带标注版</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #4facfe;
            --panel-bg: #2d2d2d;
            --compress-color: #ff5f5f;
            --tension-color: #5fbaff;
            --highlight-plane: rgba(255, 215, 0, 0.2); /* 黄色高亮 */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        h1 {
            margin: 0;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-top: 10px;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 1000px;
            box-sizing: border-box;
        }

        .canvas-container {
            position: relative;
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 12px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background: linear-gradient(135deg, #00f260 0%, #0575e6 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.96);
        }

        button.secondary {
            background: #444;
        }

        label {
            font-size: 14px;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input[type="checkbox"] {
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
        }

        .info-panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .info-title {
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: block;
        }

        .legend {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<header>
    <h1>位错可视化 (带结构标注)</h1>
    <div class="subtitle">清晰展示：多余的半个原子面 vs 位错核心</div>
</header>

<main>
    <div class="canvas-container">
        <canvas id="simCanvas" width="800" height="500"></canvas>
    </div>

    <div class="controls">
        <button id="btnAnimate">▶ 开始滑移</button>
        <button id="btnReset" class="secondary">↺ 重置位置</button>
        
        <div class="control-group">
            <input type="checkbox" id="chkStress" checked>
            <label for="chkStress">显示应力场颜色</label>
        </div>
        
        <div class="control-group">
            <input type="checkbox" id="chkBonds" checked>
            <label for="chkBonds">显示化学键</label>
        </div>

        <div class="control-group">
            <label>位错位置:</label>
            <input type="range" id="sliderDislocation" min="2" max="14" step="0.05" value="4">
        </div>
    </div>

    <div class="info-panel" id="infoText">
        <span class="info-title">观察重点</span>
        <ul>
            <li style="color: #ffd700;">★ <strong style="color:#ffd700">黄色背景区域</strong>：这是<strong>多余的半个原子面</strong>。你可以看到它像一个“塞子”一样插在晶体中间，终止于绿色符号处。</li>
            <li style="color: #00ff00;">★ <strong style="color:#00ff00">绿色符号 ⊥</strong>：这是<strong>位错核心</strong>（Dislocation Core）。这里是晶格畸变最严重的地方。</li>
        </ul>
        <br>
        当你拖动滑块时，注意观察这个黄色区域是如何在晶体中“平移”的，这就是位错滑移。
    </div>
</main>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const btnAnimate = document.getElementById('btnAnimate');
    const btnReset = document.getElementById('btnReset');
    const chkStress = document.getElementById('chkStress');
    const chkBonds = document.getElementById('chkBonds');
    const sliderDislocation = document.getElementById('sliderDislocation');

    // Simulation Parameters
    const atomRadius = 12;
    const spacing = 38; 
    const rows = 12;
    const cols = 20;
    
    // State
    let dislocationX = 4; // Grid index (float)
    let isAnimating = false;
    let animationId = null;
    
    // Data structure for atoms
    let atoms = [];

    function initAtoms() {
        atoms = [];
        const startX = (canvas.width - cols * spacing) / 2;
        const startY = (canvas.height - rows * spacing) / 2;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                atoms.push({
                    baseR: r,
                    baseC: c,
                    x: startX + c * spacing,
                    y: startY + r * spacing,
                    dx: 0,
                    dy: 0
                });
            }
        }
    }

    function updateAtoms() {
        const coreY = (rows / 2) * spacing; 
        
        atoms.forEach(atom => {
            const distX = atom.baseC - dislocationX;
            const width = 1.5; 
            const sigmoid = 1 / (1 + Math.exp(-(dislocationX - atom.baseC) / width));
            
            let targetDx = 0;
            
            // Top half shifts right to create the step
            if (atom.baseR < rows / 2) {
                targetDx = (spacing / 2) * sigmoid;
            } else {
                targetDx = 0;
            }
            
            atom.dx = targetDx;
            atom.dy = 0;
        });
    }

    function getAtomColor(atom) {
        if (!chkStress.checked) return '#a0a0a0';

        const dx = atom.baseC - dislocationX;
        const dy = atom.baseR - rows / 2;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < 0.8) return '#ff5f5f'; 
        
        let val = Math.sin(angle = Math.atan2(dy, dx)); 
        
        if (val < 0) return `rgb(255, ${95 + (1+val)*80}, ${95 + (1+val)*80})`; 
        else return `rgb(${95 + (1-val)*80}, ${95 + (1-val)*80}, 255)`; 
        
        return '#a0a0a0';
    }

    function drawLabel(text, x, y, color) {
        ctx.save();
        ctx.font = 'bold 14px sans-serif';
        ctx.fillStyle = color;
        ctx.shadowColor = 'black';
        ctx.shadowBlur = 4;
        ctx.fillText(text, x, y);
        ctx.restore();
    }

    function drawArrow(fromX, fromY, toX, toY, color) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 2;
        
        const headlen = 8;
        const angle = Math.atan2(toY - fromY, toX - fromX);
        
        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
        ctx.fill();
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        updateAtoms();

        // 1. Draw "Extra Half Plane" Highlight (Yellow Background)
        // The extra plane is roughly at column dislocationX
        const planeColX = (canvas.width - cols * spacing) / 2 + Math.round(dislocationX) * spacing;
        const planeTopY = (canvas.height - rows * spacing) / 2;
        const slipPlaneY = (canvas.height - rows * spacing) / 2 + (rows / 2) * spacing;
        
        ctx.save();
        ctx.fillStyle = 'rgba(255, 215, 0, 0.15)'; // Yellow transparent
        // Draw a rectangle covering the top half of that column
        ctx.fillRect(planeColX - spacing/2, planeTopY, spacing, slipPlaneY - planeTopY);
        
        // Draw a bracket for the plane
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(planeColX - spacing/2 + 5, planeTopY + 5);
        ctx.lineTo(planeColX - spacing/2, planeTopY + 5);
        ctx.lineTo(planeColX - spacing/2, slipPlaneY - atomRadius);
        ctx.moveTo(planeColX + spacing/2, planeTopY + 5);
        ctx.lineTo(planeColX + spacing/2, slipPlaneY - atomRadius);
        ctx.stroke();
        ctx.restore();

        // 2. Draw Bonds
        if (chkBonds.checked) {
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            
            for (let i = 0; i < atoms.length; i++) {
                for (let j = i + 1; j < atoms.length; j++) {
                    const a = atoms[i];
                    const b = atoms[j];
                    if (Math.abs(a.baseR - b.baseR) > 1 || Math.abs(a.baseC - b.baseC) > 1) continue;
                    
                    const ax = a.x + a.dx;
                    const ay = a.y + a.dy;
                    const bx = b.x + b.dx;
                    const by = b.y + b.dy;
                    
                    const dist = Math.sqrt((ax-bx)**2 + (ay-by)**2);
                    if (dist < spacing * 1.5) {
                        ctx.beginPath();
                        ctx.moveTo(ax, ay);
                        ctx.lineTo(bx, by);
                        ctx.stroke();
                    }
                }
            }
        }

        // 3. Draw Atoms
        atoms.forEach(atom => {
            const ax = atom.x + atom.dx;
            const ay = atom.y + atom.dy;
            
            const grad = ctx.createRadialGradient(ax - 3, ay - 3, 2, ax, ay, atomRadius);
            const baseColor = getAtomColor(atom);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, baseColor);
            grad.addColorStop(1, '#000000');
            
            ctx.beginPath();
            ctx.arc(ax, ay, atomRadius, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Special Highlight for atoms IN the extra half plane
            // If atom is roughly in the highlighted column and in the top half
            const isExtraPlaneAtom = Math.abs(atom.baseC - dislocationX) < 0.6 && atom.baseR < rows / 2;
            if (isExtraPlaneAtom) {
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        });

        // 4. Draw Core Symbol (Perpendicular T)
        const coreScreenX = (canvas.width - cols * spacing) / 2 + dislocationX * spacing;
        const coreScreenY = (canvas.height - rows * spacing) / 2 + (rows / 2) * spacing;
        
        ctx.save();
        ctx.strokeStyle = '#00ff00'; // Bright Green
        ctx.lineWidth = 4;
        ctx.shadowColor = 'black';
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.moveTo(coreScreenX, coreScreenY - 25);
        ctx.lineTo(coreScreenX, coreScreenY + 10); // Vertical part
        ctx.lineTo(coreScreenX - 10, coreScreenY + 10); // Horizontal left
        ctx.moveTo(coreScreenX, coreScreenY + 10);
        ctx.lineTo(coreScreenX + 10, coreScreenY + 10); // Horizontal right
        ctx.stroke();
        ctx.restore();

        // 5. Draw Labels
        drawLabel("位错核心", coreScreenX + 20, coreScreenY, "#00ff00");
        
        // Label for the extra plane (positioned above)
        drawLabel("多余的半个原子面", planeColX - 80, planeTopY + 20, "#ffd700");
        // Draw arrow pointing to the plane
        drawArrow(planeColX - 80, planeTopY + 25, planeColX - 20, planeTopY + 40, "#ffd700");
    }

    function animate() {
        if (!isAnimating) return;
        
        dislocationX += 0.03;
        if (dislocationX >= cols - 2) {
            dislocationX = cols - 2;
            isAnimating = false;
            btnAnimate.textContent = "▶ 开始滑移";
        }
        
        document.getElementById('sliderDislocation').value = dislocationX;
        draw();
        animationId = requestAnimationFrame(animate);
    }

    // Event Listeners
    btnAnimate.addEventListener('click', () => {
        if (dislocationX >= cols - 2) {
            dislocationX = 4;
        }
        isAnimating = !isAnimating;
        btnAnimate.textContent = isAnimating ? "❚❚ 暂停" : "▶ 继续滑移";
        if (isAnimating) animate();
    });

    btnReset.addEventListener('click', () => {
        isAnimating = false;
        cancelAnimationFrame(animationId);
        dislocationX = 4;
        btnAnimate.textContent = "▶ 开始滑移";
        document.getElementById('sliderDislocation').value = dislocationX;
        draw();
    });

    document.getElementById('sliderDislocation').addEventListener('input', (e) => {
        dislocationX = parseFloat(e.target.value);
        if (isAnimating) {
            isAnimating = false;
            cancelAnimationFrame(animationId);
            btnAnimate.textContent = "▶ 继续滑移";
        }
        draw();
    });

    chkStress.addEventListener('change', draw);
    chkBonds.addEventListener('change', draw);

    initAtoms();
    atoms.forEach(atom => {
        atom.x = (canvas.width - cols * spacing) / 2 + atom.baseC * spacing;
        atom.y = (canvas.height - rows * spacing) / 2 + atom.baseR * spacing;
    });
    draw();

</script>

</body>
</html>
